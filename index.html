<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pos Bulk Uploader</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
  <link rel="icon" type="image/png" href="logo.png">
  
  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; padding: 15px; margin: 0; }
    .container { width: 100%; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); box-sizing: border-box; }
    h2 { color: #00bcd4; text-align: center; margin-top: 0; margin-bottom: 25px; }
    
    .form-row { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; }
    .form-group { flex: 1; min-width: 250px; }
    label { font-weight: bold; display: block; margin-bottom: 8px; color: #333; }
    select, input[type="file"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 15px; box-sizing: border-box; }
    
    .loader { color: #ff9800; font-weight: bold; text-align: center; margin-bottom: 20px; font-size: 16px;}
    .success { color: #4CAF50; font-weight: bold; text-align: center; margin-bottom: 20px; font-size: 16px;}
    .error { color: #f44336; font-weight: bold; text-align: center; margin-bottom: 20px; font-size: 16px;}
    
    hr { border: 0; border-top: 2px solid #eee; margin: 30px 0; }
    
    .action-area { display: flex; align-items: center; gap: 15px; margin-top: 10px; flex-wrap: wrap; }
    .btn { background: #00bcd4; color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-size: 15px; font-weight: bold; text-decoration: none; display: inline-block; text-align: center; }
    .btn:hover { background: #008ba3; }
    .btn-sample { background: #4CAF50; white-space: nowrap; }
    .btn-sample:hover { background: #45a049; }
    .btn-upload { margin-top: 20px; width: 100%; font-size: 18px; padding: 15px; display: none; }
    
    .select2-container .select2-selection--single { height: 44px !important; border: 1px solid #ccc !important; border-radius: 4px !important; padding: 8px !important; font-size: 15px; }
    .select2-container--default .select2-selection--single .select2-selection__arrow { height: 42px !important; }
    
    #previewSection { display: none; margin-top: 25px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background-color: #fafafa; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 20px; background: white; }
    th { background-color: #00bcd4; color: white; padding: 10px; border: 1px solid #ddd; }
    td { padding: 8px; border: 1px solid #ddd; text-align: center; }
    
    #progressMsg { display: none; color: #ff9800; font-weight: bold; font-size: 18px; text-align: center; margin-top: 15px; }

    .paste-container { overflow-x: auto; max-height: 250px; border: 2px dashed #00bcd4; border-radius: 4px; background: #fff; margin-top: 15px; }
    #pasteGridTable { width: 100%; border-collapse: collapse; margin-bottom: 0; }
    #pasteGridTable thead th { position: sticky; top: 0; background-color: #f4f7f6; color: #333; z-index: 1; border: 1px solid #ccc; font-size: 14px; text-align: left; }
    #pasteGridTable td { border: 1px solid #eee; padding: 8px; text-align: left; font-size: 14px; outline: none; }
    #pasteGridTable td[contenteditable="true"]:focus { background-color: #e0f7fa; border: 1px solid #00bcd4; }
  </style>
</head>
<body>

  <div class="container">
    <h2>POS Bulk Product Uploader</h2>
    
    <div id="statusMsg" class="loader">Loading Live POS Data... Please Wait &#8987;</div>

    <div class="form-row">
      <div class="form-group">
        <label>Select Category *</label>
        <select id="categoryDD">
          <option value="0001">Ladies (0001)</option>
        </select>
      </div>

      <div class="form-group">
        <label>Select Sub Category *</label>
        <select id="subCategoryDD" disabled><option>Loading...</option></select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Select Vendor *</label>
        <select id="vendorDD" disabled><option>Loading...</option></select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Country of Origin *</label>
        <select id="countryDD">
          <option value="Bangladesh">Bangladesh</option>
          <option value="Pakistan" selected>Pakistan</option>
          <option value="India">India</option>
          <option value="China">China</option>
          <option value="UAE">UAE</option>
          <option value="None">None</option>
        </select>
      </div>
    </div>
    <hr>
    
    <div id="uploadSectionContainer" style="display: none;">
      <div class="form-group">
        <label>Upload Excel File OR Paste Data &#128202;</label>
        <div class="action-area">
          <input type="file" id="excelFile" accept=".xlsx, .xls, .csv" style="flex: 1;" disabled>
          <a href="data:text/csv;charset=utf-8,NAME,CPU,MRP,QTY,BRAND%0ASample Dress 1,1500,2500,10,AAFREEN (0098)%0ASample Bag 2,800,1200,5,AGHA NOOR (0003)" download="Sample_Products.csv" class="btn btn-sample">
            Download Sample File
          </a>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-top: 15px;">
          <label style="font-size: 14px; color: #666; display: block; margin-bottom: 0;">Or paste directly from Excel/Sheets (Click any box below & press Ctrl+V):</label>
          <button type="button" class="btn" style="background-color: #f44336; padding: 6px 12px; font-size: 13px;" onclick="clearPasteGrid()">&#128465;&#65039; Clear Grid</button>
        </div>
        <div class="paste-container" style="margin-top: 5px;">
          <table id="pasteGridTable">
            <thead>
              <tr>
                <th>NAME</th>
                <th>CPU</th>
                <th>MRP</th>
                <th>QTY</th>
                <th>BRAND</th>
              </tr>
            </thead>
            <tbody id="pasteGridBody">
            </tbody>
          </table>
        </div>
        
        <button id="previewBtn" class="btn btn-upload" style="background-color: #ff9800;" onclick="previewExcelData()">
          Preview Data
        </button>
      </div>
    </div> 

    <div id="previewSection">
      <h3 style="color: #333; text-align: center; margin-top: 0;">&#128196; Data Preview</h3>
      <div style="overflow-x: auto;">
        <table id="previewTable">
          <thead>
            <tr>
              <th style="width: 12%;">Barcode</th>
              <th style="width: 25%;">Name</th>
              <th style="width: 8%;">Qty</th>
              <th style="width: 10%;">CPU</th>
              <th style="width: 10%;">MRP</th>
              <th style="width: 25%;">Brand</th>
              <th style="width: 10%;">Status</th>
            </tr>
          </thead>
          <tbody id="previewBody"></tbody>
        </table>
      </div>
      
      <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;" id="actionButtons">
        <button id="downloadPreviewBtn" class="btn" style="background-color: #4CAF50;" onclick="downloadPreviewExcel()">
         Download Excel File
        </button>
        <button id="saveToPosBtn" class="btn" style="background-color: #00bcd4;" onclick="startUploadProcess()">
          Save To POS
        </button>
        <button id="printBarcodeBtn" class="btn" style="background-color: #9C27B0; display: none;" onclick="generateBarcodes()">
          &#128424; Print Barcode
        </button>
        <button id="addQtyBtn" class="btn" style="background-color: #673ab7; display: none;" onclick="processAddQty()">
          &#128230; Add QTY
        </button>
        <button id="showChannelBtn" class="btn" style="background-color: #E91E63; display: none;" onclick="openChallanPdf()">
          &#128195; Show Channel
        </button>
      </div>
      
      <div id="progressMsg"></div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwuZaImIlFPwqjVdVZ-DX0ZKweSfRYylj9rEGaAXvc8feIanuU2385Unh8Rt12zDBj-/exec"; 
    let globalExcelData = [];
    let globalBrands = []; 
    let undoStack = [];
    let redoStack = [];

    function saveGridState() {
      let tbody = document.getElementById('pasteGridBody').innerHTML;
      if (undoStack.length === 0 || undoStack[undoStack.length - 1] !== tbody) {
        undoStack.push(tbody);
        redoStack = []; 
      }
    }

    window.onload = function() {
      initEmptyGrid(5);
      saveGridState(); 
      setupPasteListener();
      
      document.getElementById('pasteGridTable').addEventListener('input', function(e) {
        let target = e.target;
        if (target.tagName === 'TD' && target.isContentEditable) {
            let tr = target.parentElement;
            let cellIndex = Array.from(tr.children).indexOf(target);
            
            if (cellIndex === 1 || cellIndex === 2 || cellIndex === 3) {
                let originalText = target.innerText;
                let sanitizedText = originalText.replace(/[^0-9.]/g, ''); 
                
                if (originalText !== sanitizedText) {
                    target.innerText = sanitizedText;
                    let selection = window.getSelection();
                    let range = document.createRange();
                    range.selectNodeContents(target);
                    range.collapse(false);
                    selection.removeAllRanges();
                    selection.addRange(range);
                }
            }
        }
      });

      document.getElementById('pasteGridTable').addEventListener('focusout', function(e) {
        if (e.target.tagName === 'TD' && e.target.isContentEditable) {
           saveGridState();
        }
      });

      fetch(SCRIPT_URL + "?action=getDropdowns")
        .then(res => res.json())
        .then(data => {
          if(data.success) {
            document.getElementById('statusMsg').className = "success";
            document.getElementById('statusMsg').innerHTML = "&#9989; Live POS Data Loaded Successfully!";
            
            globalBrands = data.brands || []; 
            
            populateDropdown('subCategoryDD', data.subCategories, 'CODE', 'SUB_CATEGORY_NAME');
            populateDropdown('vendorDD', data.vendors, 'VENDOR_CODE', 'VENDOR_NAME');
            
            $('#countryDD').select2({ width: '100%' });
            
            document.getElementById('excelFile').disabled = false;
            document.getElementById('previewBtn').style.display = 'block';
            
            $('#subCategoryDD, #vendorDD').on('change', function() {
              let subCat = $('#subCategoryDD').val();
              let vendor = $('#vendorDD').val();
              
              if (subCat && subCat !== "" && subCat !== "Loading..." && vendor && vendor !== "" && vendor !== "Loading...") {
                document.getElementById('uploadSectionContainer').style.display = 'block';
              } else {
                document.getElementById('uploadSectionContainer').style.display = 'none';
                clearPasteGrid(); 
              }
            });

          } else {
            document.getElementById('statusMsg').className = "error";
            document.getElementById('statusMsg').innerHTML = "&#10060; Error: " + data.message;
          }
        })
        .catch(err => {
          document.getElementById('statusMsg').className = "error";
          document.getElementById('statusMsg').innerHTML = "&#10060; Network Error while loading data from POS.";
        });
    };

    function initEmptyGrid(rowCount) {
      let tbody = document.getElementById('pasteGridBody');
      tbody.innerHTML = '';
      for(let i = 0; i < rowCount; i++) {
        tbody.innerHTML += `<tr><td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td></tr>`;
      }
    }

    function clearPasteGrid() {
      initEmptyGrid(5);
      saveGridState(); 
      document.getElementById('excelFile').value = "";
      document.getElementById('previewBody').innerHTML = "";
      document.getElementById('previewSection').style.display = 'none';
    }

    function setupPasteListener() {
      document.getElementById('pasteGridTable').addEventListener('paste', function(e) {
        let clipboardData = e.clipboardData || window.clipboardData;
        let text = clipboardData.getData('text/plain');
        if (!text) return;
        
        let cleanText = text.trim();
        let isMultiCell = cleanText.indexOf('\t') !== -1 || cleanText.indexOf('\n') !== -1;
        
        if (!isMultiCell) {
            e.preventDefault(); 
            if (document.queryCommandSupported('insertText')) {
                document.execCommand('insertText', false, cleanText);
            } else {
                let selection = window.getSelection();
                if (selection.rangeCount) {
                    let range = selection.getRangeAt(0);
                    range.deleteContents();
                    range.insertNode(document.createTextNode(cleanText));
                    range.collapse(false);
                }
            }
            setTimeout(() => {
                let targetTd = document.activeElement;
                if(targetTd && targetTd.tagName === 'TD') {
                    let innerText = targetTd.innerText;
                    targetTd.innerHTML = ''; 
                    targetTd.innerText = innerText.trim();
                }
                saveGridState();
            }, 10);
            return; 
        }

        e.preventDefault(); 
        let rows = text.replace(/\r/g, '').split('\n');
        if (rows[rows.length - 1] === "") {
            rows.pop(); 
        }
        
        let tbody = document.getElementById('pasteGridBody');
        let activeCell = document.activeElement;
        
        let startRowIndex = -1;
        let startColIndex = -1;
        
        if (activeCell && activeCell.tagName === 'TD' && activeCell.closest('#pasteGridBody')) {
            let tr = activeCell.parentElement;
            startRowIndex = Array.from(tbody.children).indexOf(tr);
            startColIndex = Array.from(tr.children).indexOf(activeCell);
        } else {
            startRowIndex = tbody.children.length;
            startColIndex = 0;
        }

        let dataStartIndex = 0;
        if(rows.length > 0 && (rows[0].toUpperCase().includes('NAME') || rows[0].toUpperCase().includes('CPU'))) {
            dataStartIndex = 1; 
        }

        for (let i = dataStartIndex; i < rows.length; i++) {
            let cols = rows[i].split('\t');
            let targetRowIndex = startRowIndex + (i - dataStartIndex);
            
            while (tbody.children.length <= targetRowIndex) {
                tbody.insertAdjacentHTML('beforeend', `<tr><td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td></tr>`);
            }
            
            let targetRow = tbody.children[targetRowIndex];
            
            for (let j = 0; j < cols.length; j++) {
                let targetColIndex = startColIndex + j;
                if (targetColIndex < 5) {
                    let targetTd = targetRow.children[targetColIndex];
                    if (targetTd) {
                        targetTd.innerText = cols[j].trim();
                    }
                }
            }
        }
        
        for(let i = 0; i < 2; i++) {
            tbody.insertAdjacentHTML('beforeend', `<tr><td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td></tr>`);
        }

        document.getElementById('excelFile').value = "";
        saveGridState();
      });

      document.getElementById('excelFile').addEventListener('change', function(e) {
         let fileInput = document.getElementById('excelFile');
         if(fileInput.files.length > 0) {
             let reader = new FileReader();
             reader.onload = function(evt) {
                 let data = new Uint8Array(evt.target.result);
                 let workbook = XLSX.read(data, {type: 'array'});
                 let firstSheetName = workbook.SheetNames[0];
                 let worksheet = workbook.Sheets[firstSheetName];
                 let json = XLSX.utils.sheet_to_json(worksheet);
                 
                 let tbody = document.getElementById('pasteGridBody');
                 tbody.innerHTML = '';
                 
                 json.forEach(row => {
                     let name = row.NAME || row.Name || "";
                     let cpu = row.CPU || row.BUY_PRICE || "";
                     let mrp = row.MRP || row.SALE_PRICE || "";
                     let qty = row.QTY || row.Qty || "";
                     let brand = row.BRAND || row.Brand || "";
                     tbody.insertAdjacentHTML('beforeend', `<tr><td contenteditable="true">${name}</td><td contenteditable="true">${cpu}</td><td contenteditable="true">${mrp}</td><td contenteditable="true">${qty}</td><td contenteditable="true">${brand}</td></tr>`);
                 });
                 
                 for(let i = 0; i < 2; i++) {
                    tbody.insertAdjacentHTML('beforeend', `<tr><td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td></tr>`);
                 }
                 saveGridState();
             };
             reader.readAsArrayBuffer(fileInput.files[0]);
         }
      });

      document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && (e.key === 'z' || e.key === 'Z')) {
            e.preventDefault();
            if (undoStack.length > 1) { 
                let currentState = undoStack.pop();
                redoStack.push(currentState);
                document.getElementById('pasteGridBody').innerHTML = undoStack[undoStack.length - 1];
            }
        }
        if (e.ctrlKey && (e.key === 'y' || e.key === 'Y')) {
            e.preventDefault();
            if (redoStack.length > 0) {
                let nextState = redoStack.pop();
                undoStack.push(nextState);
                document.getElementById('pasteGridBody').innerHTML = nextState;
            }
        }
      });

      document.getElementById('pasteGridTable').addEventListener('keydown', function(e) {
        let target = e.target;
        if (target.tagName === 'TD' && target.isContentEditable) {
            if (e.key === 'Enter') {
                e.preventDefault(); 
                let tr = target.parentElement; 
                let cellIndex = Array.from(tr.children).indexOf(target); 
                let nextTr = tr.nextElementSibling; 
                if (nextTr) {
                    let nextCell = nextTr.children[cellIndex];
                    if (nextCell) {
                        nextCell.focus();
                    }
                }
            }
        }
      });
    }

    function populateDropdown(elementId, list, codeKey, nameKey) {
      let dd = document.getElementById(elementId);
      dd.innerHTML = '<option value="">-- Select One --</option>';
      if(list && list.length > 0) {
        list.forEach(item => {
          let code = item[codeKey] || item.CODE || item.VENDOR_CODE; 
          let name = item[nameKey] || item.SUB_CATEGORY_NAME || item.BRAND_NAME || item.VENDOR_NAME || "Unknown";
          let opt = document.createElement('option');
          opt.value = code;
          opt.innerHTML = name + " (" + code + ")";
          dd.appendChild(opt);
        });
      }
      dd.disabled = false;
      
      $('#' + elementId).select2({
         placeholder: "-- Search & Select --",
         width: '100%'
      });
    }

    function previewExcelData() {
      let fileInput = document.getElementById('excelFile');
      let pastedData = [];
      
      let gridRows = document.querySelectorAll('#pasteGridBody tr');
      gridRows.forEach(row => {
          let cells = row.querySelectorAll('td');
          if(cells.length >= 5) {
              let name = cells[0].innerText.trim();
              let cpu = cells[1].innerText.trim();
              let mrp = cells[2].innerText.trim();
              let qty = cells[3].innerText.trim();
              let brand = cells[4].innerText.trim();
              
              if(name !== '' || cpu !== '' || mrp !== '' || qty !== '' || brand !== '') {
                  pastedData.push({ NAME: name, CPU: cpu, MRP: mrp, QTY: qty, BRAND: brand });
              }
          }
      });

      if (!fileInput.files.length && pastedData.length === 0) {
        alert("Please paste data into the grid or upload a file first!");
        return;
      }

      let btn = document.getElementById('previewBtn');
      let originalBtnText = btn.innerHTML;
      btn.innerHTML = "&#8987; Fetching Last Barcode...";
      btn.disabled = true;

      fetch(SCRIPT_URL + "?action=getLastBarcode")
        .then(res => res.text())
        .then(textData => {
           let lastBarcode = "A00000"; 
           try {
             let data = JSON.parse(textData);
             lastBarcode = data.BARCODE || data.Barcode || data.LAST_BARCODE || Object.values(data)[0] || "A00000";
           } catch(e) {
             if(textData && textData.length < 20) lastBarcode = textData.replace(/['"]/g, '');
           }

           renderDataToPreview(pastedData, lastBarcode, btn, originalBtnText);
        })
        .catch(err => {
           alert("Failed to fetch Last Barcode from POS!");
           btn.innerHTML = originalBtnText;
           btn.disabled = false;
        });
    }

    function renderDataToPreview(json, lastBarcode, btn, originalBtnText) {
      if (json.length === 0) {
        alert("The data is empty!");
        btn.innerHTML = originalBtnText;
        btn.disabled = false;
        return;
      }

      globalExcelData = json;
      let tbody = document.getElementById('previewBody');
      tbody.innerHTML = "";
      let counter = 1;

      json.forEach((row, index) => {
        let tr = document.createElement('tr');
        tr.id = "row-" + index;
        
        let currentBarcode = lastBarcode.replace(/\d+$/, function(n){ 
            return String(parseInt(n, 10) + counter).padStart(n.length, '0'); 
        });
        
        let finalBarcode = row.Barcode || row.SKU || currentBarcode;
        row.FINAL_BARCODE = finalBarcode; 

        let name = row.NAME || row.Name || "";
        let cpu = row.CPU || row.BUY_PRICE || 0;
        let mrp = row.MRP || row.SALE_PRICE || 0;
        let qty = row.QTY || row.Qty || 1;
        let brandInput = row.BRAND || row.Brand || "";
        
        let matchedBrand = null;
        if (brandInput) {
          matchedBrand = globalBrands.find(b => 
            b.BRAND_NAME.toLowerCase() === brandInput.toLowerCase() || 
            b.BRAND_NAME.toLowerCase().includes(brandInput.toLowerCase())
          );
        }
        
        if (matchedBrand) {
          row.FINAL_BRAND_CODE = matchedBrand.CODE;
        } else {
          row.FINAL_BRAND_CODE = null; 
        }

        let brandOptionsHtml = '<option value="">-- Select Brand --</option>';
        globalBrands.forEach(b => {
          let selected = (matchedBrand && matchedBrand.CODE === b.CODE) ? "selected" : "";
          brandOptionsHtml += `<option value="${b.CODE}" ${selected}>${b.BRAND_NAME} (${b.CODE})</option>`;
        });

        let selectStyle = "width:100%;";

        tr.innerHTML = `
          <td style="font-weight: bold; color: #d32f2f;">${finalBarcode}</td>
          <td style="text-align: left;">${name}</td>
          <td>${qty}</td>
          <td>${cpu}</td>
          <td>${mrp}</td>
          <td>
            <select class="preview-brand-select" data-index="${index}" style="${selectStyle}" onchange="updateRowBrand(this)">
              ${brandOptionsHtml}
            </select>
          </td>
          <td id="status-${index}" style="font-weight:bold; color:gray;">Pending</td>
        `;
        tbody.appendChild(tr);
        counter++; 
      });

      document.getElementById('previewSection').style.display = 'block';
      document.getElementById('actionButtons').style.display = 'flex';
      document.getElementById('saveToPosBtn').style.display = 'inline-block';
      document.getElementById('printBarcodeBtn').style.display = 'none';
      document.getElementById('addQtyBtn').style.display = 'none';
      document.getElementById('showChannelBtn').style.display = 'none';
      
      $('.preview-brand-select').select2({
         width: '100%'
      });

      $('.preview-brand-select').each(function() {
          if (!$(this).val()) {
              $(this).next('.select2-container').find('.select2-selection').css('border', '2px solid red');
          }
      });

      validateSaveButton(); 
      
      setTimeout(() => {
        document.getElementById('previewSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 150);

      btn.innerHTML = "&#9989; Preview Updated";
      btn.disabled = false;
    }

    function updateRowBrand(selectElem) {
      let index = selectElem.getAttribute('data-index');
      let selectedCode = selectElem.value;
      
      let select2Container = $(selectElem).next('.select2-container').find('.select2-selection');

      if (selectedCode) {
        globalExcelData[index].FINAL_BRAND_CODE = selectedCode;
        select2Container.css('border', '1px solid #ccc'); 
      } else {
        globalExcelData[index].FINAL_BRAND_CODE = null;
        select2Container.css('border', '2px solid red'); 
      }
      
      validateSaveButton();
    }

    function validateSaveButton() {
      let allValid = true;
      for (let i = 0; i < globalExcelData.length; i++) {
        if (!globalExcelData[i].FINAL_BRAND_CODE) {
          allValid = false;
          break;
        }
      }
      
      let saveBtn = document.getElementById('saveToPosBtn');
      let printBtn = document.getElementById('printBarcodeBtn');

      if (allValid && globalExcelData.length > 0) {
        saveBtn.style.display = 'inline-block';
        // Print Batton Hide
      } else {
        saveBtn.style.display = 'none';
        printBtn.style.display = 'none';
      }
    }

    function generateBarcodes() {
        if (globalExcelData.length === 0) return;
        
        let vendorSelect = document.getElementById('vendorDD');
        let vendorCode = vendorSelect.value || "";
        let labels = [];

        for (let i = 0; i < globalExcelData.length; i++) {
            let row = globalExcelData[i];
            let qty = parseInt(row.QTY || row.Qty || 1);
            if (isNaN(qty) || qty < 1) qty = 1;
            
            let baseBarcode = row.FINAL_BARCODE || "";
            let fullBarcode = baseBarcode + vendorCode; 
            let productName = row.NAME || row.Name || "";
            
            let priceRaw = parseFloat(row.MRP || row.SALE_PRICE || 0);
            let formattedPrice = priceRaw.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});

            for (let j = 0; j < qty; j++) {
                labels.push({
                    code: fullBarcode,
                    productName: productName,
                    price: formattedPrice
                });
            }
        }

        if (labels.length > 0) {
            printBarcodes(labels);
        } else {
            alert("No items to print.");
        }
    }

    function printBarcodes(labels) { 
        var perPage = 65; // 5 columns x 13 rows
        var htmlContent = ''; 
        for (var i = 0; i < labels.length; i += perPage) { 
            var pageLabels = labels.slice(i, i + perPage); 
            htmlContent += '<div class="page">' + pageLabels.map(function(l) { 
                var u = 'https://bwipjs-api.metafloor.com/?bcid=code128&text=' + encodeURIComponent(l.code) + '&scale=1&width=200&height=40&includetext=false'; 
                return `<div class="label"><div class="store">PFF PREMIUM</div><div class="product">${l.productName || ""}</div><img class="barcode" src="${u}" alt="Barcode for ${l.code}"><div class="code">${l.code}</div><div class="price">Price:${l.price}+ VAT</div></div>`; 
            }).join('') + '</div>'; 
        } 
        
        var bH = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>📦 Barcode Labels</title>
<style>
  body{font-family:Arial,sans-serif;margin:0;padding:0;}
  .print-button{position:fixed;top:10px;right:20px;padding:10px 20px;font-size:16px;z-index:999;background:#007bff;color:white;border:none;border-radius:5px;cursor:pointer;}
  .page{display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(13,1fr);column-gap:1px;row-gap:2px;width:820px;height:1120px;margin:0 auto;box-sizing:border-box;padding:10px 5px;page-break-after:always;page-break-inside:avoid;break-inside:avoid;overflow:hidden;}
  .label{width:100%;height:82px;border:none;padding:1px;box-sizing:border-box;text-align:center;font-size:9px;display:flex;flex-direction:column;justify-content:center;overflow:hidden;page-break-inside:avoid;break-inside:avoid;}
  .store{font-weight:bold;font-size:10px;}
  .product{font-size:8px;line-height:1.0;word-wrap:break-word;height:18px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:1px;}
  .code{font-size:8px;letter-spacing:0.5px;}
  .price{font-weight:bold;font-size:9px;color:#000;}
  img.barcode{display:block;margin:0 auto;max-height:28px;width:120px;object-fit:contain;}
  @media print{.print-button{display:none!important;}@page{size:A4;margin:0;}}
</style>
</head><body><button class="print-button" onclick="window.print()">🖨️ Print</button>${htmlContent}</body></html>`; 
        
        var pW = window.open('', '_blank'); 
        pW.document.write(bH); 
        pW.document.close(); 
    }

    async function startUploadProcess() {
      if (globalExcelData.length === 0) return;

      let category = document.getElementById('categoryDD').value;
      let subCategory = document.getElementById('subCategoryDD').value;
      let vendorSelect = document.getElementById('vendorDD');
      let vendorCode = vendorSelect.value;
      let vendorName = vendorSelect.options[vendorSelect.selectedIndex] ? vendorSelect.options[vendorSelect.selectedIndex].text.split(" (")[0] : "";
      let countryValue = document.getElementById('countryDD').value;

      document.getElementById('saveToPosBtn').style.display = 'none';
      document.getElementById('printBarcodeBtn').style.display = 'none'; 
      let progressMsg = document.getElementById('progressMsg');
      progressMsg.style.display = 'block';

      let successCount = 0;

      for (let i = 0; i < globalExcelData.length; i++) {
        let row = globalExcelData[i];
        progressMsg.innerHTML = `&#8987; Uploading item ${i + 1} of ${globalExcelData.length}...`;
        let statusCell = document.getElementById(`status-${i}`);
        statusCell.innerHTML = "Uploading...";
        statusCell.style.color = "#ff9800";

        let payload = {
          "WSP": 0, "MIN_STK_QTY": 0, "SHELF_LIFE_DAYS": 0, "REORDER_QTY": 0, "OPENING_STK": 0, 
          "CONVERTION_RATE": 1, "PUR_CONVERTION_RATE": 1, "COUNTRY_OF_ORGIN": countryValue, 
          "SAL_VAT_PERCENT": 7.5, "PUR_VAT_PERCENT": 0, "SD_PERCENT": 0, "SDC_VAT_CODE": "", 
          "SDC_SD_CODE": "", "IS_MANAGE_STOCK": 1, "UserBarcodeList": [], 
          "MANUFACTURER_CODE": "00001", "DEPARTMENT_CODE": "0001", "SUB_DEPARTMENT_CODE": "0001", 
          "PUR_UOM": 3, "SALE_UOM": 3, 
          "CATEGORY_CODE": category, 
          "NAME": row.NAME || row.Name || "", 
          "SUB_CATEGORY_CODE": subCategory, 
          "BRAND_CODE": row.FINAL_BRAND_CODE, 
          "LAST_PUR_PRICE": String(row.CPU || row.BUY_PRICE || 0), 
          "MRP": String(row.MRP || row.SALE_PRICE || 0), 
          "STATUS": "N", "IS_SCALE": 0, "IS_DISC_EXEMPTION": 0, "IS_NOT_FOR_SALE": 0, 
          "IS_ACTIVE": 1, "IS_CPU_Average": 1, "IS_SHOP_REQ": 0, "HAS_BOM": 0, 
          "IS_PRICE_INCLD_VAT": 0, "IS_EXPIRY_ITEM": 0, "ITEM_TYPE": "simple", 
          "COMPANY_CODE": "10001", 
          "ProductVendorList": [{"SL_NO": 2, "VENDOR_CODE": vendorCode, "VENDOR_NAME": vendorName, "PAYMENT_METHOD": "CashPurchase", "IS_MANAGE_STOCK": 1}], 
          "IS_TRACK_RCV_SERIAL": false, "IS_CONVERTABLE": false, "IS_MANUFACTURE_DT_REQUIRED": 0, 
          "IS_BATCH_REQUIRED": 0, "ARTICLE_NO": ""
        };

        try {
          let response = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
          });
          let result = await response.json();
          if (result.success) {
            statusCell.innerHTML = "&#9989; Success";
            statusCell.style.color = "#4CAF50";
            successCount++;
          } else {
            statusCell.innerHTML = "&#10060; Failed";
            statusCell.style.color = "#f44336";
          }
        } catch (error) {
          statusCell.innerHTML = "&#10060; Error";
          statusCell.style.color = "#f44336";
        }
      }

      progressMsg.innerHTML = `&#127881; Upload Complete! ${successCount} products saved. Ready to add QTY.`;
      progressMsg.style.color = "#4CAF50";
      
      if(successCount > 0) {
         document.getElementById('addQtyBtn').style.display = 'inline-block';
         // Print hide, wait for Add Qty
      }
    }

    function getFormattedDate() {
        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        let d = new Date();
        return ("0" + d.getDate()).slice(-2) + "-" + monthNames[d.getMonth()] + "-" + d.getFullYear();
    }

    async function processAddQty() {
        document.getElementById('addQtyBtn').style.display = 'none';
        let progressMsg = document.getElementById('progressMsg');
        progressMsg.innerHTML = `&#8987; Pushing Quantity to POS Stock...`;
        progressMsg.style.color = "#ff9800";

        let vendorCode = document.getElementById('vendorDD').value;
        let dateToday = getFormattedDate(); 
        let payloadList = [];
        let totalValue = 0;

        for (let i = 0; i < globalExcelData.length; i++) {
            let row = globalExcelData[i];
            let cpu = parseFloat(row.CPU || 0);
            let mrp = parseFloat(row.MRP || 0);
            let qty = parseFloat(row.QTY || 1); 
            let val = cpu * qty;
            totalValue += val;

            payloadList.push({
                "selected": true,
                "DISPLAY_NAME": row.NAME || "",
                "PUR_UOM_NAME": "PCS",
                "PUR_PRICE": cpu,
                "USER_BARCODE1": row.FINAL_BARCODE,
                "USER_BARCODE": row.FINAL_BARCODE,
                "BARCODE": row.FINAL_BARCODE,
                "RCV_QTY": qty,
                "VALUE": val,
                "RCV_VAT": 0,
                "RCV_AMOUNT_WITHOUT_VAT": val,
                "RCV_AMOUNT": val,
                "IS_MANUFACTURE_DT_REQUIRED": 0,
                "IS_EXPIRY_ITEM": 0,
                "SAL_PRICE": mrp,
                "BARCODE_INCLUDE": "",
                "IS_CARTON": false,
                "IS_PRICE_INCLD_VAT": 0,
                "RCV_PRICE": cpu,
                "is_gift": false,
                "CONVERTION_RATE": 1,
                "CPU": cpu,
                "IS_PUR_PRICE_INCLD_VAT": false,
                "PUR_VAT_PERCENT": 0,
                "SAL_VAT_PERCENT": 7.5,
                "BATCH_NO": null,
                "ALLOW_MANUAL_BATCH_INPUT": false,
                "CARTON_SIZE": 1,
                "PURCHASE_DATE": dateToday,
                "IS_BATCH_REQUIRED": false,
                "IS_BATCH_AUTO_SERIAL": false,
                "PROFIT_PRCNT": 0,
                "PROFIT_PRCNT_ON_MRP": 0,
                "COMPANY_CODE": "10001",
                "STORE_CODE": "100010001",
                "VENDOR_CODE": vendorCode,
                "ORDER_NO": "DIRECT"
            });
        }

        let finalPayload = {
            "ORDER_NO": "DIRECT",
            "VENDOR_CODE": vendorCode,
            "PURCHASE_DATE": dateToday,
            "TOTAL_VALUE": totalValue,
            "ADDITIONAL_COST": 0,
            "AUTO_DELIVER": false,
            "COMPANY_CODE": "10001",
            "DISCOUNT_AMT": 0,
            "MANAGE_VENDORWISE_STOCK": true,
            "NET_AMOUNT": totalValue,
            "STORE_CODE": "100010001",
            "SUB_TOTAL": totalValue,
            "TOTAL_VAT": 0,
            "PurchaseReceiveDetailList": payloadList
        };

        try {
            let response = await fetch(SCRIPT_URL + "?action=addQuantity", {
                method: 'POST',
                body: JSON.stringify({ 
                    action: "addQty", 
                    tempPayload: payloadList, 
                    finalPayload: finalPayload 
                })
            });
            let result = await response.json();
            
            if (result.success) {
                progressMsg.innerHTML = `&#127881; Stock Added Successfully!`;
                progressMsg.style.color = "#4CAF50";
                
                let channelBtn = document.getElementById('showChannelBtn');
                channelBtn.style.display = 'inline-block';
                
                // New logic: Print Barcode button will show after QTY is added
                document.getElementById('printBarcodeBtn').style.display = 'inline-block';

                if(result.filename) {
                    channelBtn.setAttribute('data-url', "http://103.87.213.56/PFF" + result.filename);
                }
            } else {
                 progressMsg.innerHTML = `&#10060; Failed to Add Stock: ` + (result.message || '');
                 progressMsg.style.color = "#f44336";
                 document.getElementById('addQtyBtn').style.display = 'inline-block';
            }
        } catch(e) {
             progressMsg.innerHTML = `&#10060; Error Adding Stock: Network issue or API setup pending.`;
             progressMsg.style.color = "#f44336";
             document.getElementById('addQtyBtn').style.display = 'inline-block';
        }
    }

    function openChallanPdf() {
        let url = document.getElementById('showChannelBtn').getAttribute('data-url');
        if (url) {
            window.open(url, '_blank');
        } else {
            alert("PDF URL is not available yet.");
        }
    }

    function downloadPreviewExcel() {
      if(globalExcelData.length === 0) return;
      let wsData = [];
      wsData.push(["Barcode", "Name", "Qty", "CPU", "MRP", "Brand"]); 
      
      globalExcelData.forEach(row => {
        wsData.push([
          row.FINAL_BARCODE, 
          row.NAME || row.Name || "", 
          row.QTY || row.Qty || 1, 
          row.CPU || row.BUY_PRICE || "", 
          row.MRP || row.SALE_PRICE || "",
          row.BRAND || row.Brand || ""
        ]);
      });

      let ws = XLSX.utils.aoa_to_sheet(wsData);
      let wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Saved_POS_Data");
      XLSX.writeFile(wb, "Saved_POS_Products.xlsx");
    }
  </script>

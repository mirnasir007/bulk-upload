<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pos Bulk Uploader</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
  <link rel="icon" type="image/png" href="logo.png">
  
  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; padding: 15px; margin: 0; }
    .container { width: 100%; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); box-sizing: border-box; }
    h2 { color: #00bcd4; text-align: center; margin-top: 0; margin-bottom: 25px; }
    
    .form-row { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; }
    .form-group { flex: 1; min-width: 250px; }
    label { font-weight: bold; display: block; margin-bottom: 8px; color: #333; }
    select, input[type="file"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 15px; box-sizing: border-box; }
    
    .loader { color: #ff9800; font-weight: bold; text-align: center; margin-bottom: 20px; font-size: 16px;}
    .success { color: #4CAF50; font-weight: bold; text-align: center; margin-bottom: 20px; font-size: 16px;}
    .error { color: #f44336; font-weight: bold; text-align: center; margin-bottom: 20px; font-size: 16px;}
    
    hr { border: 0; border-top: 2px solid #eee; margin: 30px 0; }
    
    .action-area { display: flex; align-items: center; gap: 15px; margin-top: 10px; flex-wrap: wrap; }
    .btn { background: #00bcd4; color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-size: 15px; font-weight: bold; text-decoration: none; display: inline-block; text-align: center; }
    .btn:hover { background: #008ba3; }
    .btn-sample { background: #4CAF50; white-space: nowrap; }
    .btn-sample:hover { background: #45a049; }
    .btn-upload { margin-top: 20px; width: 100%; font-size: 18px; padding: 15px; display: none; }
    
    .select2-container .select2-selection--single { height: 44px !important; border: 1px solid #ccc !important; border-radius: 4px !important; padding: 8px !important; font-size: 15px; }
    .select2-container--default .select2-selection--single .select2-selection__arrow { height: 42px !important; }
    
    #previewSection { display: none; margin-top: 25px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background-color: #fafafa; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 20px; background: white; }
    th { background-color: #00bcd4; color: white; padding: 10px; border: 1px solid #ddd; }
    td { padding: 8px; border: 1px solid #ddd; text-align: center; }
    
    #progressMsg { display: none; color: #ff9800; font-weight: bold; font-size: 18px; text-align: center; margin-top: 15px; }

    /* Paste Grid Styles */
    .paste-container { overflow-x: auto; max-height: 250px; border: 2px dashed #00bcd4; border-radius: 4px; background: #fff; margin-top: 15px; }
    #pasteGridTable { width: 100%; border-collapse: collapse; margin-bottom: 0; }
    #pasteGridTable thead th { position: sticky; top: 0; background-color: #f4f7f6; color: #333; z-index: 1; border: 1px solid #ccc; font-size: 14px; text-align: left; }
    #pasteGridTable td { border: 1px solid #eee; padding: 8px; text-align: left; font-size: 14px; outline: none; }
    #pasteGridTable td[contenteditable="true"]:focus { background-color: #e0f7fa; border: 1px solid #00bcd4; }
  </style>
</head>
<body>

  <div class="container">
    <h2>POS Bulk Product Uploader</h2>
    
    <div id="statusMsg" class="loader">Loading Live POS Data... Please Wait ⏳</div>

    <div class="form-row">
      <div class="form-group">
        <label>Select Category *</label>
        <select id="categoryDD">
          <option value="0001">Ladies (0001)</option>
        </select>
      </div>

      <div class="form-group">
        <label>Select Sub Category *</label>
        <select id="subCategoryDD" disabled><option>Loading...</option></select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Select Brand *</label>
        <select id="brandDD" disabled><option>Loading...</option></select>
      </div>

      <div class="form-group">
        <label>Select Vendor *</label>
        <select id="vendorDD" disabled><option>Loading...</option></select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Country of Origin *</label>
        <select id="countryDD">
          <option value="Bangladesh">Bangladesh</option>
          <option value="Pakistan" selected>Pakistan</option>
          <option value="India">India</option>
          <option value="China">China</option>
          <option value="UAE">UAE</option>
          <option value="None">None</option>
        </select>
      </div>
    </div>
    <hr>
    
    <div class="form-group">
      <label>Upload Excel File OR Paste Data 📊</label>
      <div class="action-area">
        <input type="file" id="excelFile" accept=".xlsx, .xls, .csv" style="flex: 1;" disabled>
        <a href="data:text/csv;charset=utf-8,NAME,CPU,MRP%0ASample Dress 1,1500,2500%0ASample Bag 2,800,1200" download="Sample_Products.csv" class="btn btn-sample">
          📥 Download Sample File
        </a>
      </div>

      <!-- New Paste Grid Area -->
      <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-top: 15px;">
        <label style="font-size: 14px; color: #666; display: block; margin-bottom: 0;">Or paste directly from Excel/Sheets (Click any box below & press Ctrl+V):</label>
        <button type="button" class="btn" style="background-color: #f44336; padding: 6px 12px; font-size: 13px;" onclick="clearPasteGrid()">🗑️ Clear Grid</button>
      </div>
      <div class="paste-container" style="margin-top: 5px;">
        <table id="pasteGridTable">
          <thead>
            <tr>
              <th>NAME</th>
              <th>CPU</th>
              <th>MRP</th>
            </tr>
          </thead>
          <tbody id="pasteGridBody">
            <!-- Empty rows initialized via JS -->
          </tbody>
        </table>
      </div>
      
      <button id="previewBtn" class="btn btn-upload" style="background-color: #ff9800;" onclick="previewExcelData()">
        👁️ Preview Data
      </button>
    </div>

    <div id="previewSection">
      <h3 style="color: #333; text-align: center; margin-top: 0;">📄 Data Preview</h3>
      <div style="overflow-x: auto;">
        <table id="previewTable">
          <thead>
            <tr>
              <th>Barcode</th>
              <th>Name</th>
              <th>Qty</th>
              <th>CPU</th>
              <th>MRP</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="previewBody"></tbody>
        </table>
      </div>
      
      <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;" id="actionButtons">
        <button id="downloadPreviewBtn" class="btn" style="background-color: #4CAF50;" onclick="downloadPreviewExcel()">
          📥 Download Excel File
        </button>
        <button id="saveToPosBtn" class="btn" style="background-color: #00bcd4;" onclick="startUploadProcess()">
          ☁️ Save To POS
        </button>
      </div>
      
      <div id="progressMsg"></div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwuZaImIlFPwqjVdVZ-DX0ZKweSfRYylj9rEGaAXvc8feIanuU2385Unh8Rt12zDBj-/exec"; 
    let globalExcelData = [];

    window.onload = function() {
      initEmptyGrid(5);
      setupPasteListener();

      fetch(SCRIPT_URL + "?action=getDropdowns")
        .then(res => res.json())
        .then(data => {
          if(data.success) {
            document.getElementById('statusMsg').className = "success";
            document.getElementById('statusMsg').innerHTML = "✅ Live POS Data Loaded Successfully!";
            
            populateDropdown('subCategoryDD', data.subCategories, 'CODE', 'SUB_CATEGORY_NAME');
            populateDropdown('brandDD', data.brands, 'CODE', 'BRAND_NAME'); 
            populateDropdown('vendorDD', data.vendors, 'VENDOR_CODE', 'VENDOR_NAME');
            
            $('#countryDD').select2({ width: '100%' });
            
            document.getElementById('excelFile').disabled = false;
            document.getElementById('previewBtn').style.display = 'block';
          } else {
            document.getElementById('statusMsg').className = "error";
            document.getElementById('statusMsg').innerHTML = "❌ Error: " + data.message;
          }
        })
        .catch(err => {
          document.getElementById('statusMsg').className = "error";
          document.getElementById('statusMsg').innerHTML = "❌ Network Error while loading data from POS.";
        });
    };

    function initEmptyGrid(rowCount) {
      let tbody = document.getElementById('pasteGridBody');
      tbody.innerHTML = '';
      for(let i = 0; i < rowCount; i++) {
        tbody.innerHTML += `<tr><td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td></tr>`;
      }
    }

    function clearPasteGrid() {
      initEmptyGrid(5);
      document.getElementById('excelFile').value = "";
      document.getElementById('previewBody').innerHTML = "";
      document.getElementById('previewSection').style.display = 'none';
    }

    function setupPasteListener() {
      document.getElementById('pasteGridTable').addEventListener('paste', function(e) {
        e.preventDefault();
        let text = (e.originalEvent || e).clipboardData.getData('text/plain');
        let rows = text.trim().split('\n');
        
        let tbody = document.getElementById('pasteGridBody');
        
        let existingRows = tbody.querySelectorAll('tr');
        existingRows.forEach(tr => {
            let cells = tr.querySelectorAll('td');
            if (cells.length >= 3) {
                let isEmpty = cells[0].innerText.trim() === '' && cells[1].innerText.trim() === '' && cells[2].innerText.trim() === '';
                if (isEmpty) {
                    tr.remove();
                }
            }
        });

        let startIndex = 0;
        if(rows.length > 0 && (rows[0].toUpperCase().includes('NAME') || rows[0].toUpperCase().includes('CPU'))) {
            startIndex = 1;
        }

        let newHtml = '';
        rows.forEach((row, index) => {
            if(index >= startIndex) {
                let cols = row.split('\t');
                if(cols.length > 0 && cols[0].trim() !== '') { 
                    let name = cols[0] ? cols[0].trim() : "";
                    let cpu = cols[1] ? cols[1].trim() : "0";
                    let mrp = cols[2] ? cols[2].trim() : "0";
                    newHtml += `<tr><td contenteditable="true">${name}</td><td contenteditable="true">${cpu}</td><td contenteditable="true">${mrp}</td></tr>`;
                }
            }
        });

        for(let i = 0; i < 3; i++) {
            newHtml += `<tr><td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td></tr>`;
        }

        tbody.insertAdjacentHTML('beforeend', newHtml);
        document.getElementById('excelFile').value = "";
      });

      document.getElementById('excelFile').addEventListener('change', function() {
        initEmptyGrid(5);
      });
    }

    function populateDropdown(elementId, list, codeKey, nameKey) {
      let dd = document.getElementById(elementId);
      dd.innerHTML = '<option value="">-- Select One --</option>';
      if(list && list.length > 0) {
        list.forEach(item => {
          let code = item[codeKey] || item.CODE || item.VENDOR_CODE; 
          let name = item[nameKey] || item.SUB_CATEGORY_NAME || item.BRAND_NAME || item.VENDOR_NAME || "Unknown";
          let opt = document.createElement('option');
          opt.value = code;
          opt.innerHTML = name + " (" + code + ")";
          dd.appendChild(opt);
        });
      }
      dd.disabled = false;
      
      $('#' + elementId).select2({
         placeholder: "-- Search & Select --",
         width: '100%'
      });
    }

    function previewExcelData() {
      let fileInput = document.getElementById('excelFile');
      let pastedData = [];
      
      let gridRows = document.querySelectorAll('#pasteGridBody tr');
      gridRows.forEach(row => {
          let cells = row.querySelectorAll('td');
          if(cells.length >= 3) {
              let name = cells[0].innerText.trim();
              let cpu = cells[1].innerText.trim();
              let mrp = cells[2].innerText.trim();
              
              if(name !== '' || cpu !== '' || mrp !== '') {
                  pastedData.push({ NAME: name, CPU: cpu, MRP: mrp });
              }
          }
      });

      if (!fileInput.files.length && pastedData.length === 0) {
        alert("Please select an Excel file OR paste data into the grid first!");
        return;
      }

      let btn = document.getElementById('previewBtn');
      let originalBtnText = btn.innerHTML;
      btn.innerHTML = "⏳ Fetching Last Barcode...";
      btn.disabled = true;

      fetch(SCRIPT_URL + "?action=getLastBarcode")
        .then(res => res.text())
        .then(textData => {
           let lastBarcode = "A00000"; 
           try {
             let data = JSON.parse(textData);
             lastBarcode = data.BARCODE || data.Barcode || data.LAST_BARCODE || Object.values(data)[0] || "A00000";
           } catch(e) {
             if(textData && textData.length < 20) lastBarcode = textData.replace(/['"]/g, '');
           }

           if (fileInput.files.length > 0) {
               let file = fileInput.files[0];
               let reader = new FileReader();
               reader.onload = function(e) {
                 let data = new Uint8Array(e.target.result);
                 let workbook = XLSX.read(data, {type: 'array'});
                 let firstSheetName = workbook.SheetNames[0];
                 let worksheet = workbook.Sheets[firstSheetName];
                 let json = XLSX.utils.sheet_to_json(worksheet);
                 renderDataToPreview(json, lastBarcode, btn, originalBtnText);
               };
               reader.readAsArrayBuffer(file);
           } else {
               renderDataToPreview(pastedData, lastBarcode, btn, originalBtnText);
           }
        })
        .catch(err => {
           alert("Failed to fetch Last Barcode from POS!");
           btn.innerHTML = originalBtnText;
           btn.disabled = false;
        });
    }

    function renderDataToPreview(json, lastBarcode, btn, originalBtnText) {
      if (json.length === 0) {
        alert("The data is empty!");
        btn.innerHTML = originalBtnText;
        btn.disabled = false;
        return;
      }

      globalExcelData = json;
      let tbody = document.getElementById('previewBody');
      tbody.innerHTML = "";
      let counter = 1;

      json.forEach((row, index) => {
        let tr = document.createElement('tr');
        tr.id = "row-" + index;
        
        let currentBarcode = lastBarcode.replace(/\d+$/, function(n){ 
            return String(parseInt(n, 10) + counter).padStart(n.length, '0'); 
        });
        
        let finalBarcode = row.Barcode || row.SKU || currentBarcode;
        row.FINAL_BARCODE = finalBarcode; 

        let name = row.NAME || row.Name || "";
        let cpu = row.CPU || row.BUY_PRICE || 0;
        let mrp = row.MRP || row.SALE_PRICE || 0;

        tr.innerHTML = `
          <td style="font-weight: bold; color: #d32f2f;">${finalBarcode}</td>
          <td style="text-align: left;">${name}</td>
          <td></td>
          <td>${cpu}</td>
          <td>${mrp}</td>
          <td id="status-${index}" style="font-weight:bold; color:gray;">Pending</td>
        `;
        tbody.appendChild(tr);
        counter++; 
      });

      document.getElementById('previewSection').style.display = 'block';
      document.getElementById('actionButtons').style.display = 'flex';
      document.getElementById('saveToPosBtn').style.display = 'inline-block';
      
      setTimeout(() => {
        document.getElementById('previewSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 150);

      btn.innerHTML = "✅ Preview Updated";
      btn.disabled = false;
    }

    async function startUploadProcess() {
      if (globalExcelData.length === 0) {
        alert("No data to upload!");
        return;
      }

      let category = document.getElementById('categoryDD').value;
      let subCategory = document.getElementById('subCategoryDD').value;
      let brand = document.getElementById('brandDD').value;
      
      let vendorSelect = document.getElementById('vendorDD');
      let vendorCode = vendorSelect.value;
      let vendorName = vendorSelect.options[vendorSelect.selectedIndex] ? vendorSelect.options[vendorSelect.selectedIndex].text.split(" (")[0] : "";
      
      let countryValue = document.getElementById('countryDD').value;

      if (!subCategory || !brand || !vendorCode || !countryValue) {
        alert("Please ensure Sub Category, Brand, Vendor, and Country are selected!");
        return;
      }

      document.getElementById('actionButtons').style.display = 'none';
      let progressMsg = document.getElementById('progressMsg');
      progressMsg.style.display = 'block';

      let successCount = 0;

      for (let i = 0; i < globalExcelData.length; i++) {
        let row = globalExcelData[i];
        progressMsg.innerHTML = `⏳ Uploading item ${i + 1} of ${globalExcelData.length}...`;
        let statusCell = document.getElementById(`status-${i}`);
        statusCell.innerHTML = "Uploading...";
        statusCell.style.color = "#ff9800";

        let payload = {
          "WSP": 0, "MIN_STK_QTY": 0, "SHELF_LIFE_DAYS": 0, "REORDER_QTY": 0, "OPENING_STK": 0, 
          "CONVERTION_RATE": 1, "PUR_CONVERTION_RATE": 1, "COUNTRY_OF_ORGIN": countryValue, 
          "SAL_VAT_PERCENT": 7.5, "PUR_VAT_PERCENT": 0, "SD_PERCENT": 0, "SDC_VAT_CODE": "", 
          "SDC_SD_CODE": "", "IS_MANAGE_STOCK": 1, "UserBarcodeList": [], 
          "MANUFACTURER_CODE": "00001", "DEPARTMENT_CODE": "0001", "SUB_DEPARTMENT_CODE": "0001", 
          "PUR_UOM": 3, "SALE_UOM": 3, 
          "CATEGORY_CODE": category, 
          "NAME": row.NAME || row.Name || "", 
          "SUB_CATEGORY_CODE": subCategory, 
          "BRAND_CODE": brand, 
          "LAST_PUR_PRICE": String(row.CPU || row.BUY_PRICE || 0), 
          "MRP": String(row.MRP || row.SALE_PRICE || 0), 
          "STATUS": "N", "IS_SCALE": 0, "IS_DISC_EXEMPTION": 0, "IS_NOT_FOR_SALE": 0, 
          "IS_ACTIVE": 1, "IS_CPU_Average": 1, "IS_SHOP_REQ": 0, "HAS_BOM": 0, 
          "IS_PRICE_INCLD_VAT": 0, "IS_EXPIRY_ITEM": 0, "ITEM_TYPE": "simple", 
          "COMPANY_CODE": "10001", 
          "ProductVendorList": [{"SL_NO": 2, "VENDOR_CODE": vendorCode, "VENDOR_NAME": vendorName, "PAYMENT_METHOD": "CashPurchase", "IS_MANAGE_STOCK": 1}], 
          "IS_TRACK_RCV_SERIAL": false, "IS_CONVERTABLE": false, "IS_MANUFACTURE_DT_REQUIRED": 0, 
          "IS_BATCH_REQUIRED": 0, "ARTICLE_NO": ""
        };

        try {
          let response = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
          });
          
          let result = await response.json();
          
          if (result.success) {
            statusCell.innerHTML = "✅ Success";
            statusCell.style.color = "#4CAF50";
            successCount++;
          } else {
            statusCell.innerHTML = "❌ Failed";
            statusCell.style.color = "#f44336";
          }
        } catch (error) {
          statusCell.innerHTML = "❌ Error";
          statusCell.style.color = "#f44336";
        }
      }

      progressMsg.innerHTML = `🎉 Upload Complete! ${successCount} out of ${globalExcelData.length} items saved to POS.`;
      progressMsg.style.color = "#4CAF50";
      
      document.getElementById('actionButtons').style.display = 'flex';
      document.getElementById('saveToPosBtn').style.display = 'none';
      
      setTimeout(() => {
        downloadPreviewExcel();
      }, 1500);
    }

    function downloadPreviewExcel() {
      if(globalExcelData.length === 0) return;
      let wsData = [];
      wsData.push(["Barcode", "Name", "Qty", "CPU", "MRP"]); 
      
      globalExcelData.forEach(row => {
        wsData.push([
          row.FINAL_BARCODE, 
          row.NAME || row.Name || "", 
          "", 
          row.CPU || row.BUY_PRICE || "", 
          row.MRP || row.SALE_PRICE || ""
        ]);
      });

      let ws = XLSX.utils.aoa_to_sheet(wsData);
      let wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Saved_POS_Data");
      XLSX.writeFile(wb, "Saved_POS_Products.xlsx");
    }
  </script>
</body>
</html>
